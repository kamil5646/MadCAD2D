<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="MadCAD 2D banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0f2740"/>
      <stop offset="100%" stop-color="#114b5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d1b2"/>
      <stop offset="100%" stop-color="#ffb703"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="84" height="84" rx="18"/>
    </clipPath>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)" rx="22"/>

  <g opacity="0.2">
    <path d="M0 300 L180 180 L340 250 L520 120 L780 280 L1280 80 L1280 360 L0 360 Z" fill="#00d1b2"/>
    <path d="M0 330 L220 220 L430 300 L700 160 L900 310 L1280 190 L1280 360 L0 360 Z" fill="#ffb703" opacity="0.55"/>
  </g>

  <g transform="translate(74,70)">
    <rect x="-3" y="-3" width="90" height="90" rx="21" fill="#0d1b2a" stroke="url(#accent)" stroke-width="3"/>
    <image
      href="./madcad-512.png"
      x="0"
      y="0"
      width="84"
      height="84"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#iconClip)"
    />
  </g>

  <text x="184" y="124" fill="#f3f8ff" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">MadCAD 2D</text>
  <text x="186" y="168" fill="#9fd3ff" font-size="26" font-family="Segoe UI, Arial, sans-serif">Desktop CAD 2D for steel structures and technical drawings</text>

  <g transform="translate(186,208)">
    <rect x="0" y="0" width="148" height="36" rx="18" fill="#16324f"/>
    <text x="74" y="24" text-anchor="middle" fill="#d9edff" font-size="18" font-family="Segoe UI, Arial, sans-serif">macOS ARM64</text>

    <rect x="162" y="0" width="138" height="36" rx="18" fill="#16324f"/>
    <text x="231" y="24" text-anchor="middle" fill="#d9edff" font-size="18" font-family="Segoe UI, Arial, sans-serif">Windows x64</text>

    <rect x="314" y="0" width="102" height="36" rx="18" fill="#16324f"/>
    <text x="365" y="24" text-anchor="middle" fill="#d9edff" font-size="18" font-family="Segoe UI, Arial, sans-serif">PL / EN</text>

    <rect x="430" y="0" width="84" height="36" rx="18" fill="#16324f"/>
    <text x="472" y="24" text-anchor="middle" fill="#d9edff" font-size="18" font-family="Segoe UI, Arial, sans-serif">v5.1</text>
  </g>
</svg>
