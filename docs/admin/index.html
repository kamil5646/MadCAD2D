<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MadCAD 2D - Admin tokenów</title>
    <meta http-equiv="refresh" content="0; url=../?admin=1#token-admin" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1725;
        color: #d9e7ff;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .box {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid #355073;
        border-radius: 12px;
        background: #17263a;
        padding: 18px;
      }
      a {
        color: #7cb2ff;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Przekierowanie do panelu admina...</h1>
      <p>
        Jeśli przekierowanie nie zadziała automatycznie, kliknij:
        <a href="../?admin=1#token-admin">Otwórz panel admina tokenów</a>.
      </p>
    </div>
    <script>
      window.location.replace("../?admin=1#token-admin");
    </script>
  </body>
</html>
